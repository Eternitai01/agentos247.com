  <script>
    // Language selector
    var currentLang = 'en';
    var langLabels = {en:'EN', es:'ES', pt:'PT', fr:'FR', de:'DE', it:'IT'};

    // Inject lang selector into nav before Get Started button
    function initLangSelector() {
      var nav = document.querySelector('nav');
      if (!nav) { setTimeout(initLangSelector, 200); return; }
      var ul = nav.querySelector('ul');
      if (!ul) { setTimeout(initLangSelector, 200); return; }
      var sel = document.getElementById('lang-selector');

      // Desktop: inject into nav <ul> before Get Started
      var lastLi = ul.querySelector('li:last-child');
      if (!lastLi) { setTimeout(initLangSelector, 200); return; }
      var li = document.createElement('li');
      li.id = 'lang-selector-desktop-li';
      li.style.cssText = 'display:flex;align-items:center;list-style:none;';
      li.appendChild(sel);
      ul.insertBefore(li, lastLi);

      // Mobile: build a fresh selector injected directly into nav
      var langs = [{code:'en',flag:'🇬🇧',label:'EN'},{code:'es',flag:'🇪🇸',label:'ES'},{code:'pt',flag:'🇧🇷',label:'PT'},{code:'fr',flag:'🇫🇷',label:'FR'},{code:'de',flag:'🇩🇪',label:'DE'},{code:'it',flag:'🇮🇹',label:'IT'}];
      var mobileSel = document.createElement('div');
      mobileSel.id = 'lang-selector-mobile';
      mobileSel.style.cssText = 'position:relative;display:none;align-items:center;';

      var mBtn = document.createElement('button');
      mBtn.style.cssText = 'background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;font-size:0.8rem;font-weight:600;color:#111;padding:4px 8px;border-radius:6px;';
      mBtn.innerHTML = '🌍 <span id="m-lang-label">EN</span> <span style="font-size:0.6rem;">▼</span>';

      var mDrop = document.createElement('div');
      mDrop.style.cssText = 'display:none;position:absolute;right:0;top:calc(100% + 6px);background:#fff;border:1px solid #e5e7eb;border-radius:10px;min-width:130px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.1);overflow:hidden;';

      langs.forEach(function(l) {
        var opt = document.createElement('div');
        opt.style.cssText = 'padding:9px 14px;font-size:0.82rem;cursor:pointer;color:#374151;';
        opt.textContent = l.flag + ' ' + (l.code==='en'?'English':l.code==='es'?'Español':l.code==='pt'?'Português':l.code==='fr'?'Français':l.code==='de'?'Deutsch':'Italiano');
        opt.onmouseenter = function(){ this.style.background='#f3f4f6'; };
        opt.onmouseleave = function(){ this.style.background=''; };
        opt.onclick = function() {
          switchLang(l.code);
          var lbl = document.getElementById('m-lang-label');
          if (lbl) lbl.textContent = l.label;
          mDrop.style.display = 'none';
        };
        mDrop.appendChild(opt);
      });

      mBtn.onclick = function(e) {
        e.stopPropagation();
        mDrop.style.display = mDrop.style.display === 'none' ? 'block' : 'none';
      };
      document.addEventListener('click', function(){ mDrop.style.display='none'; });

      mobileSel.appendChild(mBtn);
      mobileSel.appendChild(mDrop);
      nav.appendChild(mobileSel);

      // Show/hide based on screen width
      function updateMobileSelector() {
        var isMobile = window.innerWidth < 768;
        mobileSel.style.display = isMobile ? 'flex' : 'none';
      }
      updateMobileSelector();
      window.addEventListener('resize', updateMobileSelector);

      sel.classList.add('ready');
    }
    setTimeout(initLangSelector, 700);

    window.toggleLangDropdown = function() {
      document.getElementById('lang-dropdown').classList.toggle('open');
    };
    document.addEventListener('click', function(e) {
      if (!e.target.closest('#lang-selector')) {
        document.getElementById('lang-dropdown').classList.remove('open');
      }
    });

    window.switchLang = function(lang) {
      document.getElementById('lang-dropdown').classList.remove('open');
      document.getElementById('lang-current-label').textContent = langLabels[lang];
      currentLang = lang;

      // Update active state on dropdown
      document.querySelectorAll('.lang-option').forEach(function(el) {
        el.classList.remove('active');
        if (el.getAttribute('onclick').indexOf("'"+lang+"'") > -1) el.classList.add('active');
      });

      // Call React's setLang directly — works for all 5 languages
      if (window.__setLang) {
        window.__setLang(lang);
      }

      // Apply translations to our injected sections
      setTimeout(function() {
        applyPricingTranslations(lang);
        renderAgentTasks(lang);
        updateCalcLangForLang(lang);
      }, 150);
    };

    window.addEventListener('scroll', function() {
      var btn = document.getElementById('back-to-top');
      if (window.scrollY > 400) btn.classList.add('visible');
      else btn.classList.remove('visible');
    });
  </script>

    function applyPricingTranslations(lang) {
      var pricing = document.getElementById('pricing');
      if (!pricing) return;

      // Build reverse map from all languages back to EN
      var reverseMap = {};
      Object.keys(featureTranslationsAll).forEach(function(l) {
        Object.keys(featureTranslationsAll[l]).forEach(function(enKey) {
          reverseMap[featureTranslationsAll[l][enKey]] = enKey;
        });
      });

      // First restore EN text
      pricing.querySelectorAll('li, span, p, div').forEach(function(el) {
        if (el.children.length === 0) {
          var txt = el.textContent.trim();
          if (reverseMap[txt]) el.textContent = reverseMap[txt];
        }
      });

      // Then apply target language
      if (lang !== 'en' && featureTranslationsAll[lang]) {
        var map = featureTranslationsAll[lang];
        pricing.querySelectorAll('li, span, p, div').forEach(function(el) {
          if (el.children.length === 0) {
            var txt = el.textContent.trim();
            if (map[txt]) el.textContent = map[txt];
          }
        });
      }
    }

    window.calcSavings = function() {
      var contract = getRawValue('calc-contract');
      var pct = parseFloat(document.getElementById('calc-pct').value) || 0;
      var plan = document.getElementById('calc-plan').value;

      if (!contract || !pct) return;

      var traditional = contract * (pct / 100);

      // Plan costs (annual subscription + tx fee on this deal)
      var annualSub = plan === "trust" ? 30000 : 78000;
      var txFee = plan === "trust" ? 0 : plan === "clubs" ? contract * 0.02 : contract * 0.02;
      var agentOS = annualSub + txFee;

      var saved = traditional - agentOS;
      var pctSaved = ((saved / traditional) * 100).toFixed(0);

      function fmt(n) {
        return '€' + Math.round(n).toLocaleString('en-EU');
      }

      document.getElementById('calc-traditional').textContent = fmt(traditional);
      document.getElementById('calc-agentos').textContent = fmt(agentOS);
      document.getElementById('calc-savings').textContent = saved > 0 ? fmt(saved) : '€0';
      document.getElementById('calc-pct-saved').textContent = saved > 0
        ? pctSaved + '% less than a traditional agent'
        : 'AgentOS is more cost-effective on larger deals';

      document.getElementById('calc-result').style.display = 'block';
    };

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
              ${securityCard('🔐','Enterprise-Grade Encryption','Bank-level AES-256 encryption for all communications, documents, and contracts at rest and in transit.')}
              ${securityCard('🔒','Zero Data Selling','We never sell, share, or monetise your personal data, contract details, or deal information. Ever.')}
              ${securityCard('📁','Secure Document Vault','Contracts, offers, medical records, and sensitive files stored in an isolated, access-controlled vault.')}
              ${securityCard('👁️','Zero Knowledge Architecture','Your AI agents process data without exposing raw information to third parties or external systems.')}
              ${securityCard('🛡️','Full Legal Confidentiality','NDAs, attorney-client privilege structures, and full legal confidentiality across every interaction.')}
              ${securityCard('🌍','GDPR & Global Compliance','Full compliance with GDPR, CCPA, and international data protection regulations in every jurisdiction.')}

          </div>
        </div>
      `;
      tasks.after(section);
    }

    var secCardNum = 0;

      secCardNum++;
      var n = String(secCardNum).padStart(2,'0');
      return '<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:22px;">' +
        '<div style="font-size:0.6rem;font-weight:700;letter-spacing:0.14em;color:rgba(255,255,255,0.2);text-transform:uppercase;margin-bottom:12px;">' + n + '</div>' +
        '<h4 style="font-size:0.88rem;font-weight:700;color:#fff;margin:0 0 6px;">' + title + '</h4>' +
        '<p style="font-size:0.78rem;color:rgba(255,255,255,0.35);line-height:1.6;margin:0;">' + desc + '</p>' +
      '</div>';
    }

                <ol style="margin:0;padding-left:18px;display:flex;flex-direction:column;gap:7px;">
                  <li style="font-size:0.82rem;color:#6b7280;">Enter the total your club paid to intermediaries/agents last year</li>

                  <li style="font-size:0.82rem;color:#6b7280;">Select your preferred currency (€ £ $)</li>
                  <li style="font-size:0.82rem;color:#6b7280;">Hit the button — see exactly what AgentOS would have cost you</li>
                </ol>
                <div style="margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f0;font-size:0.72rem;color:#9ca3af;">
                  Tip: Find your club's intermediary payments in the official FIFA TMS or your national federation's published data.
                </div>
              </div>
            </div>
            <div style="background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:32px;">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;">
                <div style="font-size:0.88rem;font-weight:700;color:#0a0a0a;line-height:1.3;">
                  Club Agency Fee Calculator<br><span style="color:#0057ff;font-size:0.78rem;">with AgentOS</span>

                <div style="display:flex;gap:4px;background:#f3f4f6;border-radius:8px;padding:3px;">
                  <button onclick="setClubCurrency('€')" id="club-cur-eur" style="padding:5px 10px;border:none;border-radius:6px;font-size:0.8rem;font-weight:700;cursor:pointer;background:#0057ff;color:#fff;">€</button>
                  <button onclick="setClubCurrency('£')" id="club-cur-gbp" style="padding:5px 10px;border:none;border-radius:6px;font-size:0.8rem;font-weight:700;cursor:pointer;background:transparent;color:#6b7280;">£</button>
                  <button onclick="setClubCurrency('$')" id="club-cur-usd" style="padding:5px 10px;border:none;border-radius:6px;font-size:0.8rem;font-weight:700;cursor:pointer;background:transparent;color:#6b7280;">$</button>
                </div>
              </div>
              <div style="display:flex;flex-direction:column;gap:16px;">
                <div>
                  <label style="display:block;font-size:0.78rem;font-weight:600;color:#374151;margin-bottom:6px;" id="club-fees-label">Agency / Intermediary Fees Paid Last Year</label>
                  <div style="position:relative;">
                    <span id="club-cur-sym-fees" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1rem;color:#9ca3af;font-weight:600;">€</span>
                    <input id="club-fees" type="number" placeholder="5,000,000" min="0" style="width:100%;padding:12px 14px 12px 30px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:1rem;font-weight:600;color:#111;background:#fff;outline:none;box-sizing:border-box;" onfocus="this.style.borderColor='#0057ff'" onblur="this.style.borderColor='#e5e7eb'"/>

                    <span id="club-cur-sym-transfers" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1rem;color:#9ca3af;font-weight:600;">€</span>
                    <input id="club-transfers" type="number" placeholder="50,000,000" min="0" style="width:100%;padding:12px 14px 12px 30px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:1rem;font-weight:600;color:#111;background:#fff;outline:none;box-sizing:border-box;" onfocus="this.style.borderColor='#0057ff'" onblur="this.style.borderColor='#e5e7eb'"/>

                  <div id="club-savings" style="font-size:2rem;font-weight:900;color:#fff;line-height:1;letter-spacing:-0.04em;"></div>

    window.calcClubSavings = function() {
      var fees = getRawValue('club-fees');
      var transfers = getRawValue('club-transfers');
      if (!fees && !transfers) { alert('Please enter at least your agency fees paid last year.'); return; }

      var traditional = fees;
      var agentOS = 78000 + (transfers * 0.02);
      var saved = traditional - agentOS;
      var pctSaved = traditional > 0 ? ((saved / traditional) * 100).toFixed(0) : 0;

      function fmt(n) { return fmtNum(n, clubCurrency); }

      document.getElementById('club-traditional').textContent = fmt(traditional);
      document.getElementById('club-agentos').textContent = fmt(agentOS);
      document.getElementById('club-savings').textContent = saved > 0 ? fmt(saved) : '€0';
      document.getElementById('club-pct-saved').textContent = saved > 0
        ? pctSaved + '% less than traditional intermediary fees'
        : 'Cost-effective on larger transfer volumes';

      document.getElementById('club-result').style.display = 'block';
    };

    injectAgentTasks();
    injectSecurity();
    injectClubCalc();
    injectCalculator();
  });
